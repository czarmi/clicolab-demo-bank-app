# CLICOLAB-DEMO-BANK-APP - reverse proxy
# Designed so individual microservices (containers) can later be moved
# behind an AWS ALB / API Gateway without changing app code.

upstream frontend_upstream {
    server frontend:5173;
}

upstream auth_service_upstream {
    server auth-service:4000;
}

server {
    listen 80;
    server_name clicolab-demo-bank-app.local;

    location /api/auth/ {
        proxy_pass http://auth_service_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend_upstream/;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
