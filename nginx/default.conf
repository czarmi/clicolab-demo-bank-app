# CLICOLAB-DEMO-BANK-APP - reverse proxy
# Designed so individual microservices (containers) can later be moved
# behind an AWS ALB / API Gateway without changing app code.

upstream frontend_upstream {
    server frontend:5173;
}

upstream auth_service_upstream {
    server auth-service:4000;
}

# clicolab-app-currency is a fully independent application running on its
# own host (10.15.0.11), NOT a container in this docker-compose. It is
# reached purely over the network.
upstream currency_api_upstream {
    server 10.15.0.10:4100;
}

server {
    listen 80;
    server_name clicolab-demo-bank-app.local;

    location /api/auth/ {
        proxy_pass http://auth_service_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/currency/ {
        proxy_pass http://currency_api_upstream/api/rates/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # External service on another host - don't let a slow/unreachable
        # currency API hang requests for too long. The frontend widget is
        # designed to silently hide itself if this call fails.
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
    }

    location / {
        proxy_pass http://frontend_upstream/;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}